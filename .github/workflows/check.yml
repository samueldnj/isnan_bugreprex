name: TMB ISNAN bug reprex

on: [push, pull_request]

jobs:
  # Test 1: TMB before Rcpp (the common pattern) — expected to FAIL
  tmb-before-rcpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: TMB, Rcpp, RcppEigen

      - name: Show compiler info
        run: |
          gcc --version
          Rscript -e 'cat(R.version.string, "\n")'
          Rscript -e 'cat("CXX:", system2("R", c("CMD", "config", "CXX"), stdout = TRUE), "\n")'

      - name: Compile isnan_bug.cpp (TMB before Rcpp)
        run: |
          echo "=== This should FAIL: TMB included before Rcpp ==="
          CXX=$(R CMD config CXX)
          CXXFLAGS=$(R CMD config CXXFLAGS)
          CPPFLAGS=$(R CMD config CPPFLAGS)
          TMB_INC=$(Rscript -e 'cat(system.file("include", package="TMB"))')
          RCPP_INC=$(Rscript -e 'cat(system.file("include", package="Rcpp"))')
          EIGEN_INC=$(Rscript -e 'cat(system.file("include", package="RcppEigen"))')
          R_INC=$(R CMD config --cppflags)

          echo "Compiling with: $CXX $CXXFLAGS"
          $CXX $CXXFLAGS $CPPFLAGS $R_INC \
            -I"$TMB_INC" -I"$RCPP_INC" -I"$EIGEN_INC" \
            -c src/isnan_bug.cpp -o /dev/null 2>&1 || true

  # Test 2: Rcpp before TMB — expected to PASS (workaround)
  rcpp-before-tmb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: TMB, Rcpp, RcppEigen

      - name: Show compiler info
        run: |
          gcc --version
          Rscript -e 'cat(R.version.string, "\n")'

      - name: Compile reversed_includes.cpp (Rcpp before TMB)
        run: |
          echo "=== This should PASS: Rcpp included before TMB ==="
          CXX=$(R CMD config CXX)
          CXXFLAGS=$(R CMD config CXXFLAGS)
          CPPFLAGS=$(R CMD config CPPFLAGS)
          TMB_INC=$(Rscript -e 'cat(system.file("include", package="TMB"))')
          RCPP_INC=$(Rscript -e 'cat(system.file("include", package="Rcpp"))')
          EIGEN_INC=$(Rscript -e 'cat(system.file("include", package="RcppEigen"))')
          R_INC=$(R CMD config --cppflags)

          echo "Compiling with: $CXX $CXXFLAGS"
          $CXX $CXXFLAGS $CPPFLAGS $R_INC \
            -I"$TMB_INC" -I"$RCPP_INC" -I"$EIGEN_INC" \
            -c src/reversed_includes.cpp -o /dev/null

  # Test 3: Full R CMD check --as-cran — expected to FAIL
  cran-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: TMB, Rcpp, RcppEigen

      - name: R CMD build
        run: R CMD build .

      - name: R CMD check --as-cran
        run: |
          R CMD check --as-cran --no-manual isnanReprex_*.tar.gz 2>&1 || true
          echo ""
          echo "=== 00install.out ==="
          cat isnanReprex.Rcheck/00install.out 2>/dev/null || echo "(not found)"

  # Test 4: TMB's own CRAN check — expected to PASS
  # (demonstrates that TMB passes its own checks while
  #  downstream packages fail)
  tmb-cran-check:
    runs-on: ubuntu-latest
    steps:
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install TMB build dependencies
        run: |
          Rscript -e 'install.packages(c("RcppEigen", "Matrix"))'

      - name: Download and check TMB from CRAN
        run: |
          echo "=== TMB's own CRAN check should PASS ==="
          Rscript -e 'download.packages("TMB", destdir = ".")'
          R CMD check --as-cran --no-manual TMB_*.tar.gz 2>&1 | tail -30
          echo ""
          echo "=== Status ==="
          grep -c "ERROR" TMB.Rcheck/00check.log && echo "TMB check had ERRORs" || echo "TMB check: no ERRORs"
