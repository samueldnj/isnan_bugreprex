name: ISNAN macro diagnostic matrix

on: [push, pull_request]

jobs:
  # Verify the fix: install TMB from the fork with the
  # one-line ISNAN fix, then run the full matrix.
  # All 24 cells should PASS, confirming the fix does
  # not break anything on any platform.
  verify-fix:
    runs-on: ${{ matrix.os }}
    name: "FIXED / ${{ matrix.os }} / R ${{ matrix.r }} / ${{ matrix.test }}"

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        r: ['4.3', '4.4', 'release', 'devel']
        test:
          - tmb-first
          - rcpp-first

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: Rcpp, RcppEigen

      - name: Install TMB from fork (with ISNAN fix)
        shell: bash
        run: |
          Rscript -e 'pak::pak("samueldnj/adcomp/TMB@fix/isnan-bessel")'

      - name: Compiler and R configuration
        shell: bash
        run: |
          echo "::group::R version"
          Rscript -e 'cat(R.version.string, "\n")'
          Rscript -e 'cat("Platform:", R.version$platform, "\n")'
          echo "::endgroup::"

          echo "::group::R CMD config"
          for var in CXX CXXFLAGS CXXSTD; do
            val=$(R CMD config $var 2>/dev/null) && \
              echo "$var: $val" || \
              echo "$var: (not available)"
          done
          echo "::endgroup::"

          echo "::group::Compiler version"
          CXX=$(R CMD config CXX 2>/dev/null | awk '{print $1}')
          $CXX --version 2>/dev/null | head -3 || echo "(could not query compiler)"
          echo "::endgroup::"

      - name: "Compile: ${{ matrix.test }} (fixed TMB)"
        shell: bash
        run: |
          CXX=$(R CMD config CXX)
          CXXFLAGS=$(R CMD config CXXFLAGS)
          CPPFLAGS=$(R CMD config CPPFLAGS)
          R_INC=$(R CMD config --cppflags)
          TMB_INC=$(Rscript -e 'cat(system.file("include", package="TMB"))')
          RCPP_INC=$(Rscript -e 'cat(system.file("include", package="Rcpp"))')
          EIGEN_INC=$(Rscript -e 'cat(system.file("include", package="RcppEigen"))')

          if [ "${{ matrix.test }}" = "tmb-first" ]; then
            SRC=src/isnan_bug.cpp
          else
            SRC=src/reversed_includes.cpp
          fi

          $CXX $CXXFLAGS $CPPFLAGS $R_INC \
            -I"$TMB_INC" -I"$RCPP_INC" -I"$EIGEN_INC" \
            -c "$SRC" -o compile_test.o
          echo ""
          echo "========================================"
          echo "RESULT: PASS (fixed TMB compiles fine)"
          echo "========================================"
          rm -f compile_test.o

  # Verify the undefs.h fix: add #undef ISNAN to each
  # undefs.h file (bessel, beta, gamma) so the macro does
  # not leak out of the namespace where it is valid.
  verify-undefs-fix:
    runs-on: ${{ matrix.os }}
    name: "UNDEFS / ${{ matrix.os }} / R ${{ matrix.r }} / ${{ matrix.test }}"

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        r: ['4.3', '4.4', 'release', 'devel']
        test:
          - tmb-first
          - rcpp-first

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: Rcpp, RcppEigen

      - name: Install TMB from fork (undefs.h fix)
        shell: bash
        run: |
          Rscript -e 'pak::pak("samueldnj/adcomp/TMB@fix/isnan-undefs")'

      - name: Compiler and R configuration
        shell: bash
        run: |
          echo "::group::R version"
          Rscript -e 'cat(R.version.string, "\n")'
          Rscript -e 'cat("Platform:", R.version$platform, "\n")'
          echo "::endgroup::"

          echo "::group::R CMD config"
          for var in CXX CXXFLAGS CXXSTD; do
            val=$(R CMD config $var 2>/dev/null) && \
              echo "$var: $val" || \
              echo "$var: (not available)"
          done
          echo "::endgroup::"

          echo "::group::Compiler version"
          CXX=$(R CMD config CXX 2>/dev/null | awk '{print $1}')
          $CXX --version 2>/dev/null | head -3 || echo "(could not query compiler)"
          echo "::endgroup::"

      - name: "Compile: ${{ matrix.test }} (undefs fix)"
        shell: bash
        run: |
          CXX=$(R CMD config CXX)
          CXXFLAGS=$(R CMD config CXXFLAGS)
          CPPFLAGS=$(R CMD config CPPFLAGS)
          R_INC=$(R CMD config --cppflags)
          TMB_INC=$(Rscript -e 'cat(system.file("include", package="TMB"))')
          RCPP_INC=$(Rscript -e 'cat(system.file("include", package="Rcpp"))')
          EIGEN_INC=$(Rscript -e 'cat(system.file("include", package="RcppEigen"))')

          if [ "${{ matrix.test }}" = "tmb-first" ]; then
            SRC=src/isnan_bug.cpp
          else
            SRC=src/reversed_includes.cpp
          fi

          $CXX $CXXFLAGS $CPPFLAGS $R_INC \
            -I"$TMB_INC" -I"$RCPP_INC" -I"$EIGEN_INC" \
            -c "$SRC" -o compile_test.o
          echo ""
          echo "========================================"
          echo "RESULT: PASS (undefs fix compiles fine)"
          echo "========================================"
          rm -f compile_test.o

  # Run R CMD check on the fixed TMB package itself to
  # confirm the fix does not break TMB's own examples/tests.
  check-fixed-tmb:
    runs-on: ${{ matrix.os }}
    name: "TMB check / ${{ matrix.os }} / R ${{ matrix.r }}"

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        r: ['release']

    steps:
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}

      - name: Install dependencies
        shell: bash
        run: |
          Rscript -e 'install.packages(c("RcppEigen", "Matrix", "numDeriv"), repos = "https://cran.rstudio.com")'

      - name: Build and check fixed TMB
        shell: bash
        run: |
          Rscript -e 'download.file("https://github.com/samueldnj/adcomp/archive/refs/heads/fix/isnan-bessel.tar.gz", "adcomp.tar.gz")'
          tar xzf adcomp.tar.gz
          R CMD build adcomp-fix-isnan-bessel/TMB
          R CMD check --as-cran --no-manual TMB_*.tar.gz

      - name: Show check results
        if: always()
        shell: bash
        run: |
          echo "=== 00check.log ==="
          cat TMB.Rcheck/00check.log 2>/dev/null || echo "(not found)"

  diagnose:
    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} / R ${{ matrix.r }} / ${{ matrix.test }}"

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        r: ['4.3', '4.4', 'release', 'devel']
        test:
          - tmb-first
          - rcpp-first

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: TMB, Rcpp, RcppEigen

      - name: Compiler and R configuration
        shell: bash
        run: |
          echo "::group::R version"
          Rscript -e 'cat(R.version.string, "\n")'
          Rscript -e 'cat("Platform:", R.version$platform, "\n")'
          echo "::endgroup::"

          echo "::group::R CMD config"
          for var in CXX CXXFLAGS CXXSTD; do
            val=$(R CMD config $var 2>/dev/null) && \
              echo "$var: $val" || \
              echo "$var: (not available)"
          done
          echo "::endgroup::"

          echo "::group::Compiler version"
          CXX=$(R CMD config CXX 2>/dev/null | awk '{print $1}')
          $CXX --version 2>/dev/null | head -3 || echo "(could not query compiler)"
          echo "::endgroup::"

      - name: "Compile: ${{ matrix.test }}"
        shell: bash
        run: |
          CXX=$(R CMD config CXX)
          CXXFLAGS=$(R CMD config CXXFLAGS)
          CPPFLAGS=$(R CMD config CPPFLAGS)
          R_INC=$(R CMD config --cppflags)
          TMB_INC=$(Rscript -e 'cat(system.file("include", package="TMB"))')
          RCPP_INC=$(Rscript -e 'cat(system.file("include", package="Rcpp"))')
          EIGEN_INC=$(Rscript -e 'cat(system.file("include", package="RcppEigen"))')

          if [ "${{ matrix.test }}" = "tmb-first" ]; then
            SRC=src/isnan_bug.cpp
          else
            SRC=src/reversed_includes.cpp
          fi

          echo "::group::Compile command"
          echo "$CXX $CXXFLAGS $CPPFLAGS $R_INC -I$TMB_INC -I$RCPP_INC -I$EIGEN_INC -c $SRC"
          echo "::endgroup::"

          # Compile, writing output to a file so we can
          # reliably grep it on all platforms (Windows
          # $() capture drops stderr in some shells)
          LOGFILE=$(mktemp)
          set +e
          $CXX $CXXFLAGS $CPPFLAGS $R_INC \
            -I"$TMB_INC" -I"$RCPP_INC" -I"$EIGEN_INC" \
            -c "$SRC" -o compile_test.o > "$LOGFILE" 2>&1
          RC=$?
          set -e

          echo "::group::Compiler output"
          cat "$LOGFILE"
          echo "::endgroup::"
          rm -f compile_test.o

          if [ $RC -ne 0 ]; then
            # Check whether failure is specifically the ISNAN bug
            if grep -qE "isnan.*not declared|ISNAN" "$LOGFILE"; then
              echo ""
              echo "========================================"
              echo "RESULT: FAIL (ISNAN macro bug confirmed)"
              echo "========================================"
              echo "::error::ISNAN macro bug: bare isnan() rejected by compiler"
            else
              echo ""
              echo "========================================"
              echo "RESULT: FAIL (unrelated compilation error)"
              echo "========================================"
              echo "::error::Compilation failed for a reason other than the ISNAN bug"
            fi
            rm -f "$LOGFILE"
            exit 1
          else
            echo ""
            echo "========================================"
            echo "RESULT: PASS (compilation succeeded)"
            echo "========================================"
          fi
          rm -f "$LOGFILE"
