name: R CMD check (GCC + C++17)

on: [push, pull_request]

jobs:
  check-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: TMB, Rcpp, RcppEigen

      - name: Show compiler info
        run: |
          gcc --version
          Rscript -e 'cat(R.version.string, "\n")'
          Rscript -e 'cat("CXX17:", system2("R", c("CMD", "config", "CXX17"), stdout = TRUE), "\n")'

      - name: Install and test
        run: |
          R CMD build .
          R CMD INSTALL isnanReprex_*.tar.gz 2>&1 | tee install.log
          # If installation succeeded, run the test
          Rscript -e 'library(isnanReprex); cat("besselK(1, 0.5):", test_besselK(1, 0.5), "\n")'
