name: TMB ISNAN bug reprex

on: [push, pull_request]

jobs:
  # TMB before Rcpp (the common pattern) — FAILS on GCC
  tmb-before-rcpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: TMB, Rcpp, RcppEigen

      - name: Show compiler info
        run: |
          gcc --version | head -1
          Rscript -e 'cat(R.version.string, "\n")'
          Rscript -e 'cat("CXX:", system2("R", c("CMD", "config", "CXX"), stdout = TRUE), "\n")'

      - name: Compile isnan_bug.cpp (TMB before Rcpp — expect FAIL)
        run: |
          CXX=$(R CMD config CXX)
          CXXFLAGS=$(R CMD config CXXFLAGS)
          CPPFLAGS=$(R CMD config CPPFLAGS)
          TMB_INC=$(Rscript -e 'cat(system.file("include", package="TMB"))')
          RCPP_INC=$(Rscript -e 'cat(system.file("include", package="Rcpp"))')
          EIGEN_INC=$(Rscript -e 'cat(system.file("include", package="RcppEigen"))')
          R_INC=$(R CMD config --cppflags)

          # Expect compilation to fail — invert exit code
          if $CXX $CXXFLAGS $CPPFLAGS $R_INC \
            -I"$TMB_INC" -I"$RCPP_INC" -I"$EIGEN_INC" \
            -c src/isnan_bug.cpp -o /dev/null 2>&1; then
            echo "::error::BUG NOT TRIGGERED — compilation succeeded unexpectedly"
            exit 1
          else
            echo "Compilation failed as expected (ISNAN macro bug confirmed)"
          fi

  # Rcpp before TMB — PASSES (workaround)
  rcpp-before-tmb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: TMB, Rcpp, RcppEigen

      - name: Show compiler info
        run: |
          gcc --version | head -1
          Rscript -e 'cat(R.version.string, "\n")'

      - name: Compile reversed_includes.cpp (Rcpp before TMB — expect PASS)
        run: |
          CXX=$(R CMD config CXX)
          CXXFLAGS=$(R CMD config CXXFLAGS)
          CPPFLAGS=$(R CMD config CPPFLAGS)
          TMB_INC=$(Rscript -e 'cat(system.file("include", package="TMB"))')
          RCPP_INC=$(Rscript -e 'cat(system.file("include", package="Rcpp"))')
          EIGEN_INC=$(Rscript -e 'cat(system.file("include", package="RcppEigen"))')
          R_INC=$(R CMD config --cppflags)

          $CXX $CXXFLAGS $CPPFLAGS $R_INC \
            -I"$TMB_INC" -I"$RCPP_INC" -I"$EIGEN_INC" \
            -c src/reversed_includes.cpp -o /dev/null
          echo "Compilation succeeded (include-order workaround works)"

  # R CMD check --as-cran on the reprex — FAILS
  cran-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: TMB, Rcpp, RcppEigen

      - name: R CMD build
        run: R CMD build .

      - name: R CMD check --as-cran (expect FAIL)
        run: |
          R CMD check --as-cran --no-manual isnanReprex_*.tar.gz 2>&1
          # If we get here, check passed unexpectedly
          echo "::error::R CMD check passed unexpectedly"
          exit 1
        continue-on-error: true

      - name: Show install log
        if: always()
        run: |
          echo "=== 00install.out ==="
          cat isnanReprex.Rcheck/00install.out 2>/dev/null || echo "(not found)"
          echo ""
          echo "=== 00check.log ==="
          cat isnanReprex.Rcheck/00check.log 2>/dev/null || echo "(not found)"
